<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Trufflehog Extension</title>
    <link href="popup.css" rel="stylesheet" type="text/css">
</head>
<body>
    <header>
        <img src="icon48.png" alt="Trufflehog">
        <h1>Trufflehog Pro</h1>
    </header>

    <main>
        <section class="card">
            <h2>Scanning Toggles</h2>
            <div class="toggle-group">
                <div class="toggle-item">
                    <span>Generic Secrets</span>
                    <label class="switch">
                        <input type="checkbox" id="generics">
                        <span class="slider round"></span>
                    </label>
                </div>
                <div class="toggle-item">
                    <span>Specific Tokens</span>
                    <label class="switch">
                        <input type="checkbox" id="specifics">
                        <span class="slider round"></span>
                    </label>
                </div>
                <div class="toggle-item">
                    <span>High Entropy Strings</span>
                    <label class="switch">
                        <input type="checkbox" id="entropy">
                        <span class="slider round"></span>
                    </label>
                </div>
            </div>
        </section>

        <section class="card">
            <h2>Probing & Alerts</h2>
            <div class="toggle-group">
                <div class="toggle-item">
                    <span>Check .env / .git</span>
                    <label class="switch">
                        <input type="checkbox" id="checkEnv">
                        <span class="slider round"></span>
                    </label>
                </div>
                <div class="toggle-item">
                    <span>Desktop Alerts</span>
                    <label class="switch">
                        <input type="checkbox" id="alerts">
                        <span class="slider round"></span>
                    </label>
                </div>
            </div>
        </section>

        <section class="card accordion-section">
            <button class="accordion">Findings <span id="findingsBadge" class="badge">0</span></button>
            <div class="panel">
                <div class="action-bar">
                    <button id="clearOriginFindings" class="btn secondary small">Clear Origin</button>
                    <button id="clearAllFindings" class="btn secondary small">Clear All</button>
                    <button id="downloadAllFindings" class="btn primary small">Export CSV</button>
                </div>
                <ul id="findingList" class="finding-list">
                    <li class="empty-state">No findings for this origin</li>
                </ul>
            </div>
        </section>

        <section class="card accordion-section">
            <button class="accordion">Reporting Webhook</button>
            <div class="panel">
                <p class="help-text">Send findings to a Slack or custom URL.</p>
                <input type="text" id="webhookUrl" placeholder="https://hooks.slack.com/services/..." style="width:100%; padding:8px; border:1px solid #ddd; border-radius:4px; box-sizing:border-box;">
                <button id="saveWebhook" class="btn primary full-width" style="margin-top:8px;">Save Webhook</button>
            </div>
        </section>

        <section class="card accordion-section">
            <button class="accordion">Origin Deny List</button>
            <div class="panel">
                <textarea id="denyList" placeholder="https://google.com, https://internal.dev"></textarea>
            </div>
        </section>

        <section class="card accordion-section">
            <button class="accordion">Batch Tab Opener</button>
            <div class="panel">
                <textarea id="tabList" placeholder="https://target1.com, https://target2.com"></textarea>
                <button id="openTabs" class="btn primary full-width">Open Tabs</button>
            </div>
        </section>
    </main>

    <footer>
        <a href="https://trufflesecurity.com" target="_blank">trufflesecurity.com</a>
    </footer>

    <script src="popup.js"></script>
</body>
</html>
